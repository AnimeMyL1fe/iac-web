---
- hosts: all
  gather_facts: yes

- hosts: zbx-servers
  roles:
    - bootstrap
    - zbx_server

- hosts: mwdb_servers_master
  roles:
    - bootstrap
    - mw_db_master
    - zbx_agent2


- hosts: web_servers
  roles:
    - bootstrap
    - mw_packages
    - mw_nginx
    - mw_web
    - zbx_agent2

- hosts: lb_servers
  roles:
    - lb_nginx
    - zbx_agent2
    
- hosts: mwdb_servers_replica
  roles:
    - bootstrap
    - mw_db_replica
    - zbx_agent2
    
- hosts: check
    - final_check




    
