---
# tasks file for lb_hapoxy
- name: install haproxy
  apt:
    name: haproxy
    state: present
    update_cache: yes

- name: copy config haproxy
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
  notify: restart haproxy

- name: enabled haproxy
  service:
    name: haproxy
    state: started
    enabled: yes
