---
# tasks file for mw_nginx
- name: install nginx
  apt:
   name: nginx
   state: present
   update_cache: yes

- name: remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: copy lb config
  template:
    src: web.j2
    dest: /etc/nginx/sites-available/web.conf
    mode: "0644"
  notify: restart nginx

- name: add symlink
  file:
    src: /etc/nginx/sites-available/web.conf
    path: /etc/nginx/sites-enabled/web.conf
    state: link
  notify: restart nginx

- name: start nginx
  service:
    name: nginx
    enabled: yes
    state: started