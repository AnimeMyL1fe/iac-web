  args:
    chdir: "{{ path_mywiki }}"
    creates: "{{ path_mywiki }}/LocalSettings.php"
  run_once: true
  notify: restart nginx

- name: fetch LocalSettings.php from mw-web1
  fetch:
    src: "{{ path_mywiki }}/LocalSettings.php"
    dest: "./LocalSettings.php"
    flat: yes
  run_once: true 

- name: copy LocalSettings.php to all web servers
  copy:
    src: "./LocalSettings.php"
    dest: "{{ path_mywiki }}/LocalSettings.php"
    owner: www-data
    group: www-data
    mode: '0644'
  notify: restart nginx
