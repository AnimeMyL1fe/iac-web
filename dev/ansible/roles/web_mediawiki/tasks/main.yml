---
# tasks file for mywiki
- name: download MediaWiki
  get_url:
    url: "{{ url }}"
    dest: /tmp/

- name: add php ppa repository
  apt_repository:
    repo: ppa:ondrej/php
    state: present
    update_cache: yes

- name: install php 8.2 and dependencies
  apt:
    name:
      - php8.2-cli
      - php8.2-pgsql
      - php8.2-xml
      - php8.2-mbstring
      - php8.2-intl
      - php8.2-gd
      - php8.2-curl
    state: present
    update_cache: yes

- name: create directory for MediaWiki
  file:
    path: "{{ path_mywiki }}"
    state: directory
    owner: "www-data"

- name: Extract mediawiki.tar.gz into /var/www/mediawiki
  unarchive:
    src: /tmp/mediawiki-1.45.3.tar.gz
    dest: "{{ path_mywiki}}"
    extra_opts: [--strip-components=1]
    remote_src: yes

- name: set php 8.2 as default
  alternatives:
    name: php
    link: /usr/bin/php
    path: /usr/bin/php8.2

- name: install MediaWiki
  shell: >
    php maintenance/run.php install 
    --dbtype="postgres" 
    --dbname="{{ mw_db_name }}" 
