---
# tasks file for mw_pg_backup_db
- name: postgresqk pg_dump
  postgresql_db:
    become_user: postgres
    state: dump
    name: "{{ mwdb_name }}"
    target: "{{ db_backup_file }}"

- name: copy on ansible master host
  fetch:
    src: "{{ db_backup_file }}"
    dest: "/backups/db/{{ inventory_hostname }}_{{ ansible_date_time.date }}.sql"
    flat: yes

- name: remove file
  file:
    path: "{{ db_backup_file }}"
    state: absent



- amazon.aws.s3_bucket:
    name: "ya-prac-grishin"
    endpoint_url: "https://storage.yandexcloud.net"
    state: present 
    key: "bacup/db/{{ inventory_hostname }}_{{ ansible_date_time.date }}.sql"
    src: "{{ db_backup_file }}"
    mode: put
    region: "ru-central1"
    access_key: "{{ my_key }}"
    secret_key: "{{ my_secret }}"