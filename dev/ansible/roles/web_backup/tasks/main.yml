---
# tasks file for web_backup
- name: install aws
  apt:
    name: awscli
    state: present
    upddate_cache: yes

- name: copy script
  template:
    src: web_backup.sh.j2
    dest: /usr/local/bin/web_backup.sh
    mode: "0755"

- name: copy service unit
  template:
    src: web_backup.service.j2
    dest: /etc/systemd/system/web_backup.service
  notify: reload daemon

- name: copy timer unit
  template:
    src: web_backup.timer.j2
    dest: /etc/systemd/system/web_backup.timer
  notify: reload daemon

- name: start timer
  systemd:
    name: web_backup.timer
    enabled: yes
    state: started