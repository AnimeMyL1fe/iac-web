- name: add symlink
  file:
    src: /etc/nginx/sites-available/nginx.conf
    path: /etc/nginx/sites-enabled/nginx.conf
    state: link
  notify: restart nginx

- name: start service
  service:
    name: nginx
    enabled: yes
    state: started
