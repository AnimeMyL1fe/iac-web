---
- name: install lb-packages
  apt:
   name: "{{ item }}"
   state: present
   update_cache: yes
  loop: "{{ lb_packages }}"


- name: remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: copy mediawiki config
  template:
    src: "{{ item.src }}"
    dest: /etc/nginx/sites-available/{{ item.dest }}
    mode: "0644"
  loop:
    - { src: 'mediawiki.conf.j2', dest: 'mediawiki.conf' }
    - { src: 'zabbix.conf.j2', dest: 'zabbix.conf'}
  notify: restart nginx

- name: add symlink
  file:
    src: /etc/nginx/sites-available/{{ item.dest }}
    path: /etc/nginx/sites-enabled/{{ item.dest }}
    state: link
  loop:
    - { dest: 'mediawiki.conf' }
    - { dest: 'zabbix.conf' }
  notify: restart nginx

- name: copy keepalived.conf
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
  notify: restart keepalived

- name: start service
  service:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop: "{{ lb_packages }}"
