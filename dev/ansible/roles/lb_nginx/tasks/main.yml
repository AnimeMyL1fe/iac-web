---
- name: install lb-packages
  apt:
   name: nginx
   state: present
   update_cache: yes


- name: remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: config nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/nginx.conf
    mode: "0644"
  notify: restart nginx

