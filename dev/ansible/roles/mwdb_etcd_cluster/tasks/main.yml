---
- name: install etcd
  apt:
    name: etcd
    state: present
    update_cache: yes

- name: etcd stop
  service:
    name: etcd
    state: stopped

- name: etcd config
  template:
    src: etcd.j2
    dest: /etc/default/etcd
  notify: restart etcd

- name: start services
  service:
    name: etcd
    enabled: yes
    state: started
